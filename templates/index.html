<!DOCTYPE html>
<html>
<head>
    <title>MemorPy</title>
</head>
<body>
    <h1>MemorPy</h1>

    <form method="POST">
        <input 
            type="range" 
            name="level" 
            min="0" 
            max="{{ max_level }}" 
            value="{{ level }}"
            onchange="this.form.submit()"
        >
    </form>

    <p>{{ text }}</p>
</body>
</html>
